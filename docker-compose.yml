services:
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbit
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  init-db:
    build:
      context: .
      target: initdb
    command: python scripts/init_business_dbs.py
    environment:
      - NEBULA_HOST=${NEBULA_HOST}
      - NEBULA_PORT=${NEBULA_PORT:-9669}
      - NEBULA_USERNAME=${NEBULA_USERNAME:-root}
      - NEBULA_PASSWORD=${NEBULA_PASSWORD:-nebula}
      - BUSINESSES=${BUSINESSES:-genshin}
    restart: "no"

  web:
    build:
      context: .
      target: web
    command: python main.py web --host 0.0.0.0 --port 8000 --no-reload
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_QUEUE_NEBULA=${RABBITMQ_QUEUE_NEBULA:-nebula_operations}
      - RABBITMQ_QUEUE_MONGO=${RABBITMQ_QUEUE_MONGO:-mongo_operations}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  cron:
    build:
      context: .
      target: cron
    command: /app/crontab_list.sh
    depends_on:
      web:
        condition: service_healthy
    environment:
      - CRAWLER_API_BASE_URL=${CRAWLER_API_BASE_URL:-http://web:8000}
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    command: python main.py worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    environment:
      - NEBULA_HOST=${NEBULA_HOST}
      - NEBULA_PORT=${NEBULA_PORT:-9669}
      - NEBULA_USERNAME=${NEBULA_USERNAME:-root}
      - NEBULA_PASSWORD=${NEBULA_PASSWORD:-nebula}
      - BUSINESSES=${BUSINESSES:-genshin}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_QUEUE_NEBULA=${RABBITMQ_QUEUE_NEBULA:-nebula_operations}
      - RABBITMQ_QUEUE_MONGO=${RABBITMQ_QUEUE_MONGO:-mongo_operations}
    restart: unless-stopped

volumes:
  rabbitmq_data: