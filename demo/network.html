<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&#20851;&#31995;&#32593;&#32476;</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand hide-when-collapsed">
            <strong data-i18n="brandTitle"></strong>
            <span data-i18n="brandSubtitle"></span>
          </div>
          <button class="icon-btn" data-sidebar-toggle data-title-key="sidebarToggle" title="">&#9776;</button>
        </div>

        <div class="panel-section hide-when-collapsed">
          <button class="theme-btn" data-theme-toggle><span data-theme-icon>&#9728;</span><span data-theme-label></span></button>
        </div>

        <div class="panel-section hide-when-collapsed">
          <h2 data-i18n="dataSection"></h2>
          <label class="file-drop">
            <strong data-i18n="fileLabel"></strong>
            <span class="micro" data-file-name data-i18n="fileHint"></span>
            <input data-file-input type="file" accept=".json,application/json" />
          </label>
        </div>

        <div class="panel-section hide-when-collapsed">
          <h2 data-i18n="filterSection"></h2>

          <div class="field">
            <label for="lang" data-i18n="languageLabel"></label>
            <select id="lang" data-lang>
              <option value="zh" data-i18n="langZh"></option>
              <option value="en" data-i18n="langEn"></option>
            </select>
          </div>

          <div class="field">
            <label for="sizeMode" data-i18n="sizeModeLabel"></label>
            <select id="sizeMode" data-size-mode>
              <option value="degree" data-i18n="sizeModeDegree"></option>
              <option value="same" data-i18n="sizeModeSame"></option>
            </select>
          </div>

          <div class="field">
            <label for="layout" data-i18n="layoutLabel"></label>
            <select id="layout" data-layout>
              <option value="radial" data-i18n="layoutRadial"></option>
              <option value="force" data-i18n="layoutForce"></option>
              <option value="circle" data-i18n="layoutCircle"></option>
              <option value="columns" data-i18n="layoutColumns"></option>
            </select>
          </div>

          <div class="filter-group">
            <div class="filter-group-title" data-i18n="focusGroupTitle"></div>
            <div class="field">
              <label for="focusNode" data-i18n="focusNodeLabel"></label>
              <select id="focusNode" data-focus-node></select>
            </div>
            <div class="field">
              <label for="focusDepth" data-i18n="focusDepthLabel"></label>
              <select id="focusDepth" data-focus-depth>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>
          </div>

          <div class="filter-group">
            <div class="filter-group-title" data-i18n="pathGroupTitle"></div>
            <div class="field">
              <label for="pathSource" data-i18n="pathSourceLabel"></label>
              <select id="pathSource" data-path-source></select>
            </div>
            <div class="field">
              <label for="pathTarget" data-i18n="pathTargetLabel"></label>
              <select id="pathTarget" data-path-target></select>
            </div>
          </div>
        </div>

        <div class="panel-section hide-when-collapsed">
          <h2 data-i18n="pageSection"></h2>
          <div class="nav-stack">
            <a class="nav-link" href="./characters.html" data-i18n="charactersLink"></a>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="page-header">
          <div class="page-title">
            <h1 data-i18n="pageTitle"></h1>
            <p data-status></p>
          </div>
          <div class="stats">
            <div class="stat"><b data-total-nodes>0</b><span data-i18n="statNodes"></span></div>
            <div class="stat"><b data-total-edges>0</b><span data-i18n="statEdges"></span></div>
            <div class="stat"><b data-density>0</b><span data-i18n="statDensity"></span></div>
          </div>
        </header>
        <section class="graph-wrap">
          <canvas id="graphCanvas"></canvas>
        </section>
      </main>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script src="./common.js"></script>

          pathMissingStatus: "\u4ece {source} \u5230 {target} \u6ca1\u6709\u627e\u5230\u6709\u5411\u8def\u5f84\u3002",
          inDegree: "\u5165\u5ea6",
          outDegree: "\u51fa\u5ea6",
          totalDegree: "\u603b\u8ba1",

          idLabel: "ID",
        },
        en: {
          documentTitle: "Relation Network",
          brandTitle: "Relation Network",
          brandSubtitle: "Directed Relation Explorer",
          sidebarToggle: "Toggle sidebar",
          dataSection: "Data",
          fileLabel: "Choose local data file",
          fileHint: "Click to import a data file",
          filterSection: "Filters",
          languageLabel: "Language",
          langZh: "Chinese",
          langEn: "English",
          focusNodeLabel: "Center character",
          focusDepthLabel: "Hop count",
          focusGroupTitle: "Focus filter",
          pathSourceLabel: "Path source",
          pathTargetLabel: "Path target",
          pathGroupTitle: "Path finder",
          sizeModeLabel: "Node size",
          sizeModeDegree: "By in-degree + out-degree",
          sizeModeSame: "Same size",
          layoutLabel: "Layout",
          layoutRadial: "Radial",
          layoutForce: "Soft force",
          layoutCircle: "Circle",
          layoutColumns: "In/Out columns",
          pageSection: "Pages",
          charactersLink: "Character Atlas",
          pageTitle: "Character Relation Network",
          statNodes: "Nodes",
          statEdges: "Edges",
          statDensity: "Avg. degree",
          selectAll: "All",
          loadedStatus: "Loaded {nodes} characters and {edges} relations.",
          focusStatus: "Showing nodes within {depth} hops from {name}.",
          pathStatus: "Showing the directed path from {source} to {target} with {steps} steps.",
          pathMissingStatus: "No directed path found from {source} to {target}.",
          inDegree: "In-degree",
          outDegree: "Out-degree",
          totalDegree: "Total",
          relationLabel: "Relation",
          relationTitle: "Relation from {source} to {target}",
          idLabel: "ID",
        },
      };
      const canvas = qs("#graphCanvas");
      const ctx = canvas.getContext("2d");
      const tooltip = qs("#tooltip");

      const app = {
        ready: false,
        dom: {},
        filters: {
          focusNodeId: "",
          focusDepth: 1,
          pathSourceId: "",
          pathTargetId: "",
          sizeMode: "degree",
          layout: "radial",
        },
        index: {
          nodeById: new Map(),
          degreeById: new Map(),
          undirectedById: new Map(),
          outgoingById: new Map(),
        },
        view: {
          focus: { active: false, nodeIds: new Set() },
          path: { active: false, found: false, nodeIds: new Set(), edgeKeys: new Set(), steps: 0 },
        },
        graph: {
          nodes: [],
          edges: [],
          nodeMap: new Map(),
          hoverNode: null,
          hoverEdge: null,
          draggingNode: null,
          panning: false,
          running: true,
          cooling: 0,
          imageCache: new Map(),
        },
        viewport: {
          scale: 1,
          minScale: 0.45,
          maxScale: 2.8,
          offsetX: 0,
          offsetY: 0,
          dragStartX: 0,
          dragStartY: 0,
          startOffsetX: 0,
          startOffsetY: 0,
        },
      };

      boot((data) => {
        if (!app.ready) {
          initPage();
          app.ready = true;
        }
        rebuildIndexes(data);
        renderCharacterSelects();
        applyTranslations();
        refreshGraph();
      });

      function initPage() {
        app.dom = {
          lang: qs("[data-lang]"),
          focusNode: qs("[data-focus-node]"),
          focusDepth: qs("[data-focus-depth]"),
          pathSource: qs("[data-path-source]"),
          pathTarget: qs("[data-path-target]"),
          sizeMode: qs("[data-size-mode]"),
          layout: qs("[data-layout]"),
          fileName: qs("[data-file-name]"),
          status: qs("[data-status]"),
          totalNodes: qs("[data-total-nodes]"),
          totalEdges: qs("[data-total-edges]"),
          density: qs("[data-density]"),
        };

        app.dom.lang.value = state.lang;
        app.dom.focusDepth.value = String(app.filters.focusDepth);
        app.dom.sizeMode.value = app.filters.sizeMode;
        app.dom.layout.value = app.filters.layout;

        bindFilterEvents();
        bindCanvasEvents();
        requestAnimationFrame(animationLoop);
      }

      function bindFilterEvents() {
        app.dom.lang.addEventListener("change", (event) => {
          state.lang = event.target.value;
          localStorage.setItem("genshin-demo-lang", state.lang);
          renderCharacterSelects();
          applyTranslations();
          drawGraph();
          hideTooltip();
        });

        app.dom.focusNode.addEventListener("change", (event) => {
          app.filters.focusNodeId = event.target.value;
          if (app.filters.focusNodeId) resetPathFilter();
          syncFilterControls();
          refreshGraph();
        });

        app.dom.focusDepth.addEventListener("change", (event) => {
          app.filters.focusDepth = Number(event.target.value) || 1;
          if (app.filters.focusNodeId) resetPathFilter();
          syncFilterControls();
          refreshGraph();
        });

        app.dom.pathSource.addEventListener("change", (event) => {
          app.filters.pathSourceId = event.target.value;
          if (app.filters.pathSourceId || app.filters.pathTargetId) resetFocusFilter();
          syncFilterControls();
          refreshGraph();
        });

        app.dom.pathTarget.addEventListener("change", (event) => {
          app.filters.pathTargetId = event.target.value;
          if (app.filters.pathSourceId || app.filters.pathTargetId) resetFocusFilter();
          syncFilterControls();
          refreshGraph();
        });

        app.dom.sizeMode.addEventListener("change", (event) => {
          app.filters.sizeMode = event.target.value;
          refreshGraph();
        });

        app.dom.layout.addEventListener("change", (event) => {
          app.filters.layout = event.target.value;
          applyLayout(true);
        });
      }

      function bindCanvasEvents() {
        canvas.addEventListener("pointerdown", onCanvasPointerDown);
        canvas.addEventListener("pointermove", onCanvasPointerMove);
        canvas.addEventListener("pointerup", onCanvasPointerUp);
        canvas.addEventListener("pointerleave", onCanvasPointerUp);
        canvas.addEventListener("pointerleave", hideTooltip);
        canvas.addEventListener("wheel", onCanvasWheel, { passive: false });

        window.addEventListener("resize", () => {
          resizeCanvas();
          applyLayout(false);
        });
      }

      function rebuildIndexes(data) {
        const nodeById = new Map((data.nodes || []).map((node) => [node.id, node]));
        const degreeById = new Map((data.nodes || []).map((node) => [node.id, { in: 0, out: 0, total: 0 }]));
        const undirectedById = new Map((data.nodes || []).map((node) => [node.id, []]));
        const outgoingById = new Map((data.nodes || []).map((node) => [node.id, []]));

        (data.edges || []).forEach((edge) => {
          const sourceDegree = degreeById.get(edge.source_id) || { in: 0, out: 0, total: 0 };
          const targetDegree = degreeById.get(edge.target_id) || { in: 0, out: 0, total: 0 };

          sourceDegree.out += 1;
          sourceDegree.total += 1;
          targetDegree.in += 1;
          targetDegree.total += 1;

          degreeById.set(edge.source_id, sourceDegree);
          degreeById.set(edge.target_id, targetDegree);
          undirectedById.get(edge.source_id)?.push({ nodeId: edge.target_id, edge });
          undirectedById.get(edge.target_id)?.push({ nodeId: edge.source_id, edge });
          outgoingById.get(edge.source_id)?.push({ nodeId: edge.target_id, edge });
        });

        app.index.nodeById = nodeById;
        app.index.degreeById = degreeById;
        app.index.undirectedById = undirectedById;
        app.index.outgoingById = outgoingById;
      }

      function renderCharacterSelects() {
        const nodes = [...(state.data.nodes || [])].sort((a, b) => {
          const locale = state.lang === "zh" ? "zh-Hans-CN" : "en";
          return getName(a).localeCompare(getName(b), locale);
        });

        renderCharacterSelect(app.dom.focusNode, app.filters.focusNodeId, nodes);
        renderCharacterSelect(app.dom.pathSource, app.filters.pathSourceId, nodes);
        renderCharacterSelect(app.dom.pathTarget, app.filters.pathTargetId, nodes);
        syncFilterControls();
      }

      function renderCharacterSelect(select, selectedValue, nodes) {
        const options = [
          `<option value="">${escapeHtml(t("selectAll"))}</option>`,
          ...nodes.map((node) => `<option value="${escapeHtml(node.id)}">${escapeHtml(getName(node))} (${escapeHtml(node.id)})</option>`),
        ];
        select.innerHTML = options.join("");
        select.value = selectedValue;
      }

      function syncFilterControls() {
        app.dom.focusNode.value = app.filters.focusNodeId;
        app.dom.focusDepth.value = String(app.filters.focusDepth);
        app.dom.pathSource.value = app.filters.pathSourceId;
        app.dom.pathTarget.value = app.filters.pathTargetId;
      }

      function resetFocusFilter() {
        app.filters.focusNodeId = "";
      }

      function resetPathFilter() {
        app.filters.pathSourceId = "";
        app.filters.pathTargetId = "";
      }

      function refreshGraph() {
        resizeCanvas();
        app.view.focus = buildFocusSelection();
        app.view.path = buildPathSelection();

        const visibleNodeIds = buildVisibleNodeIds();
        const visibleEdgeKeys = app.view.path.active ? app.view.path.edgeKeys : null;

        app.graph.nodes = buildGraphNodes(visibleNodeIds);
        app.graph.nodeMap = new Map(app.graph.nodes.map((node) => [node.id, node]));
        app.graph.edges = buildGraphEdges(visibleEdgeKeys);

        updateStats();
        applyLayout(true);
      }

      function buildFocusSelection() {
        const startId = app.filters.focusNodeId;
        if (!startId || !app.index.nodeById.has(startId)) {
          return { active: false, nodeIds: new Set() };
        }

        const maxDepth = Math.max(1, app.filters.focusDepth);
        const nodeIds = new Set([startId]);
        const queue = [{ nodeId: startId, depth: 0 }];

        while (queue.length) {
          const current = queue.shift();
          if (current.depth >= maxDepth) continue;
          for (const next of app.index.undirectedById.get(current.nodeId) || []) {
            if (nodeIds.has(next.nodeId)) continue;
            nodeIds.add(next.nodeId);
            queue.push({ nodeId: next.nodeId, depth: current.depth + 1 });
          }
        }

        return { active: true, startId, depth: maxDepth, nodeIds };
      }

      function buildPathSelection() {
        const sourceId = app.filters.pathSourceId;
        const targetId = app.filters.pathTargetId;
        const empty = { active: false, found: false, nodeIds: new Set(), edgeKeys: new Set(), steps: 0 };

        if (!sourceId || !targetId || !app.index.nodeById.has(sourceId) || !app.index.nodeById.has(targetId)) {
          return empty;
        }

        if (sourceId === targetId) {
          return {
            active: true,
            found: true,
            sourceId,
            targetId,
            nodeIds: new Set([sourceId]),
            edgeKeys: new Set(),
            steps: 0,
          };
        }

        const queue = [sourceId];
        const visited = new Set([sourceId]);
        const previous = new Map();

        while (queue.length) {
          const currentId = queue.shift();
          for (const next of app.index.outgoingById.get(currentId) || []) {
            if (visited.has(next.nodeId)) continue;
            visited.add(next.nodeId);
            previous.set(next.nodeId, { fromId: currentId, edge: next.edge });
            if (next.nodeId === targetId) {
              return buildResolvedPath(sourceId, targetId, previous);
            }
            queue.push(next.nodeId);
          }
        }

        return {
          active: true,
          found: false,
          sourceId,
          targetId,
          nodeIds: new Set([sourceId, targetId]),
          edgeKeys: new Set(),
          steps: 0,
        };
      }

      function buildResolvedPath(sourceId, targetId, previous) {
        const nodeIds = new Set([targetId]);
        const edgeKeys = new Set();
        let currentId = targetId;
        let steps = 0;

        while (currentId !== sourceId) {
          const item = previous.get(currentId);
          if (!item) break;
          steps += 1;
          edgeKeys.add(edgeKey(item.edge));
          nodeIds.add(item.fromId);
          currentId = item.fromId;
        }

        return { active: true, found: true, sourceId, targetId, nodeIds, edgeKeys, steps };
      }

      function buildVisibleNodeIds() {
        let nodeIds = new Set((state.data.nodes || []).map((node) => node.id));
        if (app.view.focus.active) nodeIds = intersectSets(nodeIds, app.view.focus.nodeIds);
        if (app.view.path.active) nodeIds = intersectSets(nodeIds, app.view.path.nodeIds);
        return nodeIds;
      }

      function buildGraphNodes(visibleNodeIds) {
        return (state.data.nodes || [])
          .filter((node) => visibleNodeIds.has(node.id))
          .map((node, index) => {
            const seed = seededPosition(index, node.id);
            const degree = app.index.degreeById.get(node.id) || { in: 0, out: 0, total: 0 };
            const radius = app.filters.sizeMode === "same" ? 18 : Math.max(16, Math.min(34, 14 + Math.sqrt(degree.total) * 2.4));
            const graphNode = {
              ...node,
              x: seed.x * Math.max(1, canvas.clientWidth),
              y: seed.y * Math.max(1, canvas.clientHeight),
              vx: 0,
              vy: 0,
              r: radius,
              degree,
              isFocusCenter: node.id === app.filters.focusNodeId,
              isPathNode: app.view.path.nodeIds.has(node.id),
            };
            preloadNodeImage(graphNode);
            return graphNode;
          });
      }

      function buildGraphEdges(visibleEdgeKeys) {
        return (state.data.edges || [])
          .filter((edge) => app.graph.nodeMap.has(edge.source_id) && app.graph.nodeMap.has(edge.target_id))
          .filter((edge) => !visibleEdgeKeys || visibleEdgeKeys.has(edgeKey(edge)))
          .map((edge) => ({
            ...edge,
            isPath: app.view.path.edgeKeys.has(edgeKey(edge)),
          }));
      }

      function updateStats() {
        app.dom.totalNodes.textContent = app.graph.nodes.length;
        app.dom.totalEdges.textContent = app.graph.edges.length;
        app.dom.density.textContent = app.graph.nodes.length ? (app.graph.edges.length / app.graph.nodes.length).toFixed(1) : "0";
        app.dom.status.textContent = buildStatusText();
      }

      function buildStatusText() {
        const nodeCount = state.data.nodes?.length || 0;
        const edgeCount = state.data.edges?.length || 0;
        if (!nodeCount) return uiText("importPrompt");

        const lines = [formatText(t("loadedStatus"), { nodes: nodeCount, edges: edgeCount })];

        if (app.view.focus.active) {
          lines.push(formatText(t("focusStatus"), {
            name: getDisplayName(app.view.focus.startId),
            depth: app.view.focus.depth,
          }));
        }

        if (app.view.path.active) {
          const key = app.view.path.found ? "pathStatus" : "pathMissingStatus";
          lines.push(formatText(t(key), {
            source: getDisplayName(app.view.path.sourceId),
            target: getDisplayName(app.view.path.targetId),
            steps: app.view.path.steps,
          }));
        }

        return lines.join(" ");
      }

      function getDisplayName(nodeId) {
        const node = app.index.nodeById.get(nodeId);
        return node ? getName(node) : nodeId;
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.floor(rect.width * dpr));
        const height = Math.max(1, Math.floor(rect.height * dpr));
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function applyLayout(resetVelocity) {
        resizeCanvas();
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        const centerX = width / 2;
        const centerY = height / 2;
        const nodes = [...app.graph.nodes].sort((a, b) => b.degree.total - a.degree.total);

        nodes.forEach((node, index) => {
          if (resetVelocity) node.vx = node.vy = 0;

          if (app.filters.layout === "circle") {
            placeCircleNode(node, index, nodes.length, centerX, centerY, width, height);
          } else if (app.filters.layout === "radial") {
            placeRadialNode(node, index, nodes, centerX, centerY, width, height);
          } else if (app.filters.layout === "columns") {
            placeColumnNode(node, index, width, height);
          } else {
            placeSeedNode(node, index, centerX, centerY, width, height);
          }
        });

        app.graph.running = true;
        app.graph.cooling = app.filters.layout === "force" ? 1 : 0;
        drawGraph();
      }

      function placeCircleNode(node, index, count, centerX, centerY, width, height) {
        const angle = (Math.PI * 2 * index) / Math.max(1, count);
        const radius = Math.min(width, height) * 0.38;
        node.x = centerX + Math.cos(angle) * radius;
        node.y = centerY + Math.sin(angle) * radius;
      }

      function placeRadialNode(node, index, nodes, centerX, centerY, width, height) {
        const topDegree = Math.max(1, nodes[0]?.degree.total || 1);
        const ring = 1 - (node.degree.total || 1) / topDegree;
        const angle = (Math.PI * 2 * index * 0.618) % (Math.PI * 2);
        const radius = Math.min(width, height) * (0.08 + ring * 0.38);
        node.x = centerX + Math.cos(angle) * radius;
        node.y = centerY + Math.sin(angle) * radius;
      }

      function placeColumnNode(node, index, width, height) {
        const balance = node.degree.out - node.degree.in;
        const column = balance > 3 ? 0.25 : balance < -3 ? 0.75 : 0.5;
        node.x = width * column + (seededPosition(index, node.id).x - 0.5) * 50;
        node.y = 56 + (index % Math.max(1, Math.floor(height / 42))) * 42;
      }

      function placeSeedNode(node, index, centerX, centerY, width, height) {
        const seed = seededPosition(index, node.id);
        const angle = Math.PI * 2 * seed.x;
        const radius = Math.min(width, height) * (0.1 + seed.y * 0.28);
        node.x = centerX + Math.cos(angle) * radius;
        node.y = centerY + Math.sin(angle) * radius;
      }

      function animationLoop() {
        if (app.filters.layout === "force" && app.graph.running) {
          simulateForceLayout();
        }
        drawGraph();
        requestAnimationFrame(animationLoop);
      }

      function simulateForceLayout() {
        for (let i = 0; i < 2; i++) {
          applyRepulsion();
          applyEdgeTension();
          moveNodes();
        }
      }

      function applyRepulsion() {
        app.graph.nodes.forEach((a, i) => {
          for (let j = i + 1; j < app.graph.nodes.length; j++) {
            const b = app.graph.nodes[j];
            const dx = a.x - b.x || 0.01;
            const dy = a.y - b.y || 0.01;
            const distanceSquared = dx * dx + dy * dy;
            const force = Math.min(1.8, 780 / distanceSquared) * app.graph.cooling;
            const distance = Math.sqrt(distanceSquared);
            a.vx += (dx / distance) * force;
            a.vy += (dy / distance) * force;
            b.vx -= (dx / distance) * force;
            b.vy -= (dy / distance) * force;
          }
        });
      }

      function applyEdgeTension() {
        app.graph.edges.forEach((edge) => {
          const source = app.graph.nodeMap.get(edge.source_id);
          const target = app.graph.nodeMap.get(edge.target_id);
          if (!source || !target) return;
          const dx = target.x - source.x;
          const dy = target.y - source.y;
          const distance = Math.sqrt(dx * dx + dy * dy) || 1;
          const targetDistance = 72 + Math.min(55, (source.r + target.r) * 2.2);
          const force = (distance - targetDistance) * 0.0009 * app.graph.cooling;
          source.vx += dx * force;
          source.vy += dy * force;
          target.vx -= dx * force;
          target.vy -= dy * force;
        });
      }

      function moveNodes() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        const centerX = width / 2;
        const centerY = height / 2;
        let energy = 0;

        app.graph.nodes.forEach((node) => {
          if (node.fixed) return;
          node.vx += (centerX - node.x) * 0.006 * app.graph.cooling;
          node.vy += (centerY - node.y) * 0.006 * app.graph.cooling;
          node.vx *= 0.72;
          node.vy *= 0.72;

          const speed = Math.hypot(node.vx, node.vy);
          if (speed > 5) {
            node.vx = (node.vx / speed) * 5;
            node.vy = (node.vy / speed) * 5;
          }

          node.x = Math.max(node.r + 8, Math.min(width - node.r - 8, node.x + node.vx));
          node.y = Math.max(node.r + 8, Math.min(height - node.r - 8, node.y + node.vy));
          energy += Math.abs(node.vx) + Math.abs(node.vy);
        });

        app.graph.cooling *= 0.985;
        if (app.graph.cooling < 0.035 || energy < 0.08) app.graph.running = false;
      }

      function drawGraph() {
        resizeCanvas();
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.save();
        ctx.translate(app.viewport.offsetX, app.viewport.offsetY);
        ctx.scale(app.viewport.scale, app.viewport.scale);
        app.graph.edges.forEach(drawEdge);
        app.graph.nodes.forEach(drawNode);
        ctx.restore();
      }

      function drawEdge(edge) {
        const source = app.graph.nodeMap.get(edge.source_id);
        const target = app.graph.nodeMap.get(edge.target_id);
        if (!source || !target) return;

        const points = edgeLine(source, target);
        const active = edge.isPath || edge === app.graph.hoverEdge || source === app.graph.hoverNode || target === app.graph.hoverNode;
        const color = edge.isPath ? "rgba(200, 138, 40, 0.92)" : active ? "rgba(200, 138, 40, 0.82)" : getCssColor("--line", 0.72);

        ctx.strokeStyle = color;
        ctx.lineWidth = edge.isPath ? 2.4 : active ? 1.8 : 1;
        ctx.beginPath();
        ctx.moveTo(points.startX, points.startY);
        ctx.lineTo(points.endX, points.endY);
        ctx.stroke();

        drawArrow(points.endX, points.endY, points.ux, points.uy, color, edge.isPath ? 8 : 6);
      }

      function edgeLine(source, target) {
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const distance = Math.sqrt(dx * dx + dy * dy) || 1;
        const ux = dx / distance;
        const uy = dy / distance;
        return {
          startX: source.x + ux * (source.r + 4),
          startY: source.y + uy * (source.r + 4),
          endX: target.x - ux * (target.r + 8),
          endY: target.y - uy * (target.r + 8),
          ux,
          uy,
        };
      }

      function drawArrow(x, y, ux, uy, color, size) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x - ux * size - uy * size * 0.7, y - uy * size + ux * size * 0.7);
        ctx.lineTo(x - ux * size + uy * size * 0.7, y - uy * size - ux * size * 0.7);
        ctx.closePath();
        ctx.fill();
      }

      function drawNode(node) {
        const active = node === app.graph.hoverNode || node.isFocusCenter || node.isPathNode;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.r + (active ? 7 : 4), 0, Math.PI * 2);
        ctx.fillStyle = node.isPathNode
          ? "rgba(200, 138, 40, 0.28)"
          : node.isFocusCenter
            ? "rgba(35, 122, 111, 0.28)"
            : active
              ? "rgba(200, 138, 40, 0.22)"
              : "rgba(35, 122, 111, 0.16)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
        drawNodeBody(node);
        ctx.strokeStyle = active || node.isPathNode ? getCssColor("--accent-2") : getCssColor("--panel-strong");
        ctx.lineWidth = active || node.isPathNode ? 3 : 2;
        ctx.stroke();
      }

      function drawNodeBody(node) {
        const image = app.graph.imageCache.get(node.properties.photo || "");
        if (image?.ready) {
          ctx.save();
          ctx.clip();
          const size = node.r * 2;
          ctx.fillStyle = getCssColor("--panel-strong");
          ctx.fillRect(node.x - node.r, node.y - node.r, size, size);
          ctx.drawImage(image.element, node.x - node.r, node.y - node.r, size, size);
          ctx.restore();
          return;
        }

        const gradient = ctx.createRadialGradient(node.x - node.r * 0.35, node.y - node.r * 0.35, 1, node.x, node.y, node.r);
        gradient.addColorStop(0, getCssColor("--accent-2"));
        gradient.addColorStop(1, getCssColor("--accent"));
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.save();
        ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
        ctx.font = `700 ${Math.max(12, node.r * 0.75)}px Segoe UI, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(getName(node) || node.id).slice(0, 1).toUpperCase(), node.x, node.y + 1);
        ctx.restore();
      }

      function preloadNodeImage(node) {
        const url = node.properties.photo;
        if (!url || app.graph.imageCache.has(url)) return;
        const entry = { ready: false, element: new Image() };
        entry.element.crossOrigin = "anonymous";
        entry.element.onload = () => {
          entry.ready = true;
          drawGraph();
        };
        entry.element.onerror = () => drawGraph();
        entry.element.src = url;
        app.graph.imageCache.set(url, entry);
      }

      function onCanvasPointerDown(event) {
        const point = eventPoint(event);
        app.graph.draggingNode = findNodeAt(point.x, point.y);

        if (app.graph.draggingNode) {
          app.graph.draggingNode.fixed = true;
          app.graph.running = false;
          canvas.setPointerCapture(event.pointerId);
          return;
        }

        app.graph.panning = true;
        app.viewport.dragStartX = event.clientX;
        app.viewport.dragStartY = event.clientY;
        app.viewport.startOffsetX = app.viewport.offsetX;
        app.viewport.startOffsetY = app.viewport.offsetY;
        canvas.setPointerCapture(event.pointerId);
      }

      function onCanvasPointerMove(event) {
        const point = eventPoint(event);

        if (app.graph.draggingNode) {
          app.graph.draggingNode.x = point.x;
          app.graph.draggingNode.y = point.y;
          app.graph.draggingNode.vx = 0;
          app.graph.draggingNode.vy = 0;
          showNodeTooltip(app.graph.draggingNode, event);
          return;
        }

        if (app.graph.panning) {
          app.viewport.offsetX = app.viewport.startOffsetX + (event.clientX - app.viewport.dragStartX);
          app.viewport.offsetY = app.viewport.startOffsetY + (event.clientY - app.viewport.dragStartY);
          hideTooltip();
          drawGraph();
          return;
        }

        app.graph.hoverNode = findNodeAt(point.x, point.y);
        app.graph.hoverEdge = app.graph.hoverNode ? null : findEdgeAt(point.x, point.y);

        if (app.graph.hoverNode) showNodeTooltip(app.graph.hoverNode, event);
        else if (app.graph.hoverEdge) showEdgeTooltip(app.graph.hoverEdge, event);
        else hideTooltip();
      }

      function onCanvasPointerUp(event) {
        if (app.graph.draggingNode) {
          app.graph.draggingNode.fixed = false;
          app.graph.draggingNode = null;
        }
        app.graph.panning = false;
        try {
          canvas.releasePointerCapture(event.pointerId);
        } catch {}
      }

      function onCanvasWheel(event) {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const cursorX = event.clientX - rect.left;
        const cursorY = event.clientY - rect.top;
        const before = screenToWorld(cursorX, cursorY);
        const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;
        const nextScale = clamp(app.viewport.scale * factor, app.viewport.minScale, app.viewport.maxScale);
        if (nextScale === app.viewport.scale) return;

        app.viewport.scale = nextScale;
        app.viewport.offsetX = cursorX - before.x * app.viewport.scale;
        app.viewport.offsetY = cursorY - before.y * app.viewport.scale;
        drawGraph();
      }

      function findNodeAt(x, y) {
        for (let i = app.graph.nodes.length - 1; i >= 0; i--) {
          const node = app.graph.nodes[i];
          if (Math.hypot(x - node.x, y - node.y) <= node.r + 5) return node;
        }
        return null;
      }

      function findEdgeAt(x, y) {
        let best = null;
        let bestDistance = 7;

        app.graph.edges.forEach((edge) => {
          const source = app.graph.nodeMap.get(edge.source_id);
          const target = app.graph.nodeMap.get(edge.target_id);
          if (!source || !target) return;
          const points = edgeLine(source, target);
          const distance = pointToSegmentDistance(x, y, points.startX, points.startY, points.endX, points.endY);
          if (distance < bestDistance) {
            bestDistance = distance;
            best = edge;
          }
        });

        return best;
      }

      function showNodeTooltip(node, event) {
        tooltip.innerHTML = `
          ${node.properties.photo ? `<img src="${escapeHtml(node.properties.photo)}" alt="">` : ""}
          <h3>${escapeHtml(getName(node))}</h3>
          <p>ID: ${escapeHtml(node.id)}</p>
          <div class="chips">
            <span class="chip">${escapeHtml(t("inDegree"))} ${node.degree.in}</span>
            <span class="chip">${escapeHtml(t("outDegree"))} ${node.degree.out}</span>
            <span class="chip">${escapeHtml(t("totalDegree"))} ${node.degree.total}</span>
          </div>
        `;
        moveTooltip(event);
      }

      function showEdgeTooltip(edge, event) {
        const source = edgeEndpoint(edge, "source");
        const target = edgeEndpoint(edge, "target");
        const extraFields = Object.entries(edge.properties || {})
          .filter(([key, value]) => value && !["source_name_en", "target_name_en", "source_name_zh", "target_name_zh", "content_en", "content_zh", "title_en", "title_zh"].includes(key))
          .map(([key, value]) => `<p>${escapeHtml(key)}: ${escapeHtml(value)}</p>`)
          .join("");

        tooltip.innerHTML = `
          <h3>${escapeHtml(formatText(t("relationTitle"), { source, target }))}</h3>
          <p>${escapeHtml(getRelationText(edge))}</p>
          ${extraFields}
          <div class="chips">
            <span class="chip">${escapeHtml(edge.source_id)}</span>
            <span class="chip">${escapeHtml(t("relationLabel"))}</span>
            <span class="chip">${escapeHtml(edge.target_id)}</span>
          </div>
        `;
        moveTooltip(event);
      }

      function moveTooltip(event) {
        tooltip.classList.add("visible");
        const x = Math.min(window.innerWidth - 320, event.clientX + 14);
        const y = Math.min(window.innerHeight - 180, event.clientY + 14);
        tooltip.style.left = `${Math.max(10, x)}px`;
        tooltip.style.top = `${Math.max(10, y)}px`;
      }

      function hideTooltip() {
        app.graph.hoverNode = null;
        app.graph.hoverEdge = null;
        tooltip.classList.remove("visible");
      }

      function eventPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return screenToWorld(event.clientX - rect.left, event.clientY - rect.top);
      }

      function screenToWorld(x, y) {
        return {
          x: (x - app.viewport.offsetX) / app.viewport.scale,
          y: (y - app.viewport.offsetY) / app.viewport.scale,
        };
      }

      function applyTranslations() {
        document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
        document.title = t("documentTitle");
        qsa("[data-i18n]").forEach((element) => {
          element.textContent = t(element.dataset.i18n);
        });
        qsa("[data-title-key]").forEach((element) => {
          element.title = t(element.dataset.titleKey);
        });
        if (app.dom.fileName) {
          app.dom.fileName.textContent = app.dom.fileName.dataset.loadedFileName ? uiText("fileLoaded") : t("fileHint");
        }
      }

      function getRelationText(edge) {
        const props = edge?.properties || {};
        return props[`content_${state.lang}`] || props[`title_${state.lang}`] || "";
      }

      function edgeKey(edge) {
        return `${edge.source_id}->${edge.target_id}::${edge.id || edgeTitle(edge, "en") || ""}`;
      }

      function intersectSets(a, b) {
        return new Set([...a].filter((value) => b.has(value)));
      }

      function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
        const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
        return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
      }

      function getCssColor(name, alpha) {
        const color = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        if (alpha == null) return color;
        return color.startsWith("#") ? `${color}${Math.round(alpha * 255).toString(16).padStart(2, "0")}` : color;
      }

      function seededPosition(index, text) {
        let hash = 2166136261;
        const value = `${text}:${index}`;
        for (let i = 0; i < value.length; i++) {
          hash ^= value.charCodeAt(i);
          hash = Math.imul(hash, 16777619);
        }
        const x = ((hash >>> 0) % 10000) / 10000;
        hash = Math.imul(hash ^ 0x9e3779b9, 16777619);
        const y = ((hash >>> 0) % 10000) / 10000;
        return { x, y };
      }

      function t(key) {
        return PAGE_TEXT[state.lang]?.[key] || PAGE_TEXT.en[key] || key;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }
    </script>
  </body>
</html>
