<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&#35282;&#33394;&#22270;&#37492;</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand hide-when-collapsed">
            <strong data-i18n="brandTitle"></strong>
            <span data-i18n="brandSubtitle"></span>
          </div>
          <button class="icon-btn" data-sidebar-toggle data-title-key="sidebarToggle" title="">&#9776;</button>
        </div>

        <div class="panel-section hide-when-collapsed">
          <button class="theme-btn" data-theme-toggle><span data-theme-icon">&#9728;</span><span data-theme-label></span></button>
        </div>

        <div class="panel-section hide-when-collapsed">
          <h2 data-i18n="dataSection"></h2>
          <label class="file-drop">
            <strong data-i18n="fileLabel"></strong>
            <span class="micro" data-file-name data-i18n="fileHint"></span>
            <input data-file-input type="file" accept=".json,application/json" />
          </label>
        </div>

        <div class="panel-section hide-when-collapsed">
          <h2 data-i18n="filterSection"></h2>
          <div class="field">
            <label for="lang" data-i18n="languageLabel"></label>
            <select id="lang" data-lang>
              <option value="zh" data-i18n="langZh"></option>
              <option value="en" data-i18n="langEn"></option>
            </select>
          </div>
          <div class="field">
            <label for="search" data-i18n="searchLabel"></label>
            <input id="search" data-search type="text" data-placeholder-key="searchPlaceholder" placeholder="" />
          </div>
          <div class="field">
            <label for="sort" data-i18n="sortLabel"></label>
            <select id="sort" data-sort>
              <option value="name" data-i18n="sortName"></option>
              <option value="degree" data-i18n="sortDegree"></option>
            </select>
          </div>
        </div>

        <div class="panel-section hide-when-collapsed">
          <h2 data-i18n="pageSection"></h2>
          <div class="nav-stack">
            <a class="nav-link" href="./network.html" data-i18n="networkLink"></a>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="page-header">
          <div class="page-title">
            <h1 data-i18n="pageTitle"></h1>
            <p data-status></p>
          </div>
          <div class="stats">
            <div class="stat"><b data-total>0</b><span data-i18n="statTotal"></span></div>
            <div class="stat"><b data-visible>0</b><span data-i18n="statVisible"></span></div>
            <div class="stat"><b data-edges>0</b><span data-i18n="statEdges"></span></div>
          </div>
        </header>
        <section id="characterGrid" class="grid"></section>
      </main>
    </div>
    <div class="floating-related-panel" data-floating-panel>
      <h4 data-floating-title></h4>
      <div data-floating-content></div>
    </div>

    <script src="./common.js"></script>
    <script>
      const PAGE_TEXT = {
        zh: {
          documentTitle: "\u89d2\u8272\u56fe\u9274",
          brandTitle: "\u89d2\u8272\u56fe\u9274",
          brandSubtitle: "\u89d2\u8272\u5173\u7cfb\u6d4f\u89c8",
          sidebarToggle: "\u6536\u653e\u7b5b\u9009\u680f",
          dataSection: "\u6570\u636e",
          fileLabel: "\u9009\u62e9\u672c\u5730\u6570\u636e\u6587\u4ef6",
          fileHint: "\u70b9\u51fb\u5bfc\u5165\u6570\u636e\u6587\u4ef6",
          filterSection: "\u7b5b\u9009",
          languageLabel: "\u8bed\u8a00",
          langZh: "\u4e2d\u6587",
          langEn: "\u82f1\u6587",
          searchLabel: "\u540d\u5b57\u6a21\u7cca\u641c\u7d22",
          searchPlaceholder: "\u8f93\u5165\u4e2d\u6587\u3001\u82f1\u6587\u6216 id",
          sortLabel: "\u6392\u5e8f",
          sortName: "\u6309\u5f53\u524d\u8bed\u8a00\u540d\u5b57",
          sortDegree: "\u6309\u5173\u8054\u6570\u91cf",
          pageSection: "\u9875\u9762",
          networkLink: "\u62d3\u6251\u7f51\u7edc",
          pageTitle: "\u89d2\u8272\u56fe\u9274",
          statTotal: "\u89d2\u8272",
          statVisible: "\u5f53\u524d\u7ed3\u679c",
          statEdges: "\u5173\u7cfb",
          empty: "\u6ca1\u6709\u627e\u5230\u5339\u914d\u89d2\u8272",
          noRelated: "\u6682\u65e0\u76f8\u5173\u89d2\u8272",
          idLabel: "ID",
          connections: "\u8fde\u63a5",
          relatedTitle: "\u76f8\u5173\u89d2\u8272",
          loadedStatus: "\u5df2\u52a0\u8f7d {nodes} \u540d\u89d2\u8272\u4e0e {edges} \u6761\u5173\u7cfb\u3002",
        },
        en: {
          documentTitle: "Character Atlas",
          brandTitle: "Character Atlas",
          brandSubtitle: "Relationship Browser",
          sidebarToggle: "Toggle sidebar",
          dataSection: "Data",
          fileLabel: "Choose local data file",
          fileHint: "Click to import a data file",
          filterSection: "Filters",
          languageLabel: "Language",
          langZh: "Chinese",
          langEn: "English",
          searchLabel: "Name search",
          searchPlaceholder: "Search by Chinese, English, or id",
          sortLabel: "Sort",
          sortName: "Sort by current language name",
          sortDegree: "Sort by connection count",
          pageSection: "Pages",
          networkLink: "Topology Network",
          pageTitle: "Character Atlas",
          statTotal: "Characters",
          statVisible: "Visible",
          statEdges: "Relations",
          empty: "No matching characters found",
          noRelated: "No related characters yet",
          idLabel: "ID",
          connections: "Connections",
          relatedTitle: "Related Characters",
          loadedStatus: "Loaded {nodes} characters and {edges} relations.",
        },
      };
      const app = {
        filters: {
          query: "",
          sort: "name",
        },
        index: {
          degreeById: new Map(),
          relatedById: new Map(),
        },
        panel: {
          hoveredId: null,
          pinnedId: null,
        },
        dom: {},
      };

      boot((data) => {
        initDom();
        bindEvents();
        rebuildIndex(data);
        applyTranslations();
        renderPage();
      });

      function initDom() {
        app.dom = {
          lang: qs("[data-lang]"),
          search: qs("[data-search]"),
          sort: qs("[data-sort]"),
          grid: qs("#characterGrid"),
          status: qs("[data-status]"),
          total: qs("[data-total]"),
          visible: qs("[data-visible]"),
          edges: qs("[data-edges]"),
          fileName: qs("[data-file-name]"),
          panel: qs("[data-floating-panel]"),
          panelTitle: qs("[data-floating-title]"),
          panelContent: qs("[data-floating-content]"),
        };
      }

      function bindEvents() {
        app.dom.lang.value = state.lang;
        app.dom.lang.addEventListener("change", onLanguageChange);
        app.dom.search.addEventListener("input", onSearchChange);
        app.dom.sort.addEventListener("change", onSortChange);
        app.dom.grid.addEventListener("mouseover", onCardHover);
        app.dom.grid.addEventListener("mouseout", onCardLeave);
        app.dom.panel.addEventListener("click", onPanelClick);
        app.dom.panel.addEventListener("mouseleave", onPanelLeave);
        document.addEventListener("click", onDocumentClick);
        window.addEventListener("scroll", syncFloatingPanel, { passive: true });
        window.addEventListener("resize", syncFloatingPanel);
      }

      function onLanguageChange(event) {
        state.lang = event.target.value;
        localStorage.setItem("genshin-demo-lang", state.lang);
        applyTranslations();
        renderPage();
      }

      function onSearchChange(event) {
        app.filters.query = event.target.value.trim().toLowerCase();
        renderPage();
      }

      function onSortChange(event) {
        app.filters.sort = event.target.value;
        renderPage();
      }

      function onCardHover(event) {
        if (app.panel.pinnedId) return;
        const card = event.target.closest("[data-character-id]");
        if (!card) return;
        showFloatingPanel(card.dataset.characterId);
      }

      function onCardLeave(event) {
        if (app.panel.pinnedId) return;
        const card = event.target.closest("[data-character-id]");
        if (!card) return;
        if (card.contains(event.relatedTarget)) return;
        if (event.relatedTarget?.closest?.("[data-floating-panel]")) return;
        hideFloatingPanel();
      }

      function onPanelClick(event) {
        const jumpButton = event.target.closest("[data-related-jump]");
        if (jumpButton) {
          openCharacterPanel(jumpButton.dataset.targetId);
          return;
        }
        if (app.panel.hoveredId) {
          app.panel.pinnedId = app.panel.hoveredId;
          syncFloatingPanel();
        }
      }

      function onPanelLeave() {
        if (app.panel.pinnedId) return;
        hideFloatingPanel();
      }

      function onDocumentClick(event) {
        if (!app.panel.pinnedId) return;
        if (event.target.closest("[data-floating-panel]")) return;
        closePinnedPanel();
      }

      function rebuildIndex(data) {
        app.index.degreeById = buildDegreeIndex(data);
        app.index.relatedById = buildRelationIndex(data);
        keepPanelStateValid();
      }

      function buildDegreeIndex(data) {
        const result = new Map(data.nodes.map((node) => [node.id, 0]));
        data.edges.forEach((edge) => {
          result.set(edge.source_id, (result.get(edge.source_id) || 0) + 1);
          result.set(edge.target_id, (result.get(edge.target_id) || 0) + 1);
        });
        return result;
      }

      function buildRelationIndex(data) {
        const nodeById = new Map(data.nodes.map((node) => [node.id, node]));
        const result = new Map(data.nodes.map((node) => [node.id, []]));

        data.edges.forEach((edge) => {
          const sourceNode = nodeById.get(edge.source_id);
          const targetNode = nodeById.get(edge.target_id);
          if (!sourceNode || !targetNode) return;

          result.get(sourceNode.id).push({ node: targetNode, edge, direction: "out" });
          result.get(targetNode.id).push({ node: sourceNode, edge, direction: "in" });
        });

        return result;
      }

      function renderPage() {
        const nodes = state.data.nodes || [];
        const visibleNodes = getVisibleNodes(nodes);

        keepPanelStateValid();
        renderStats(nodes, visibleNodes);
        renderGrid(visibleNodes);
        syncFloatingPanel();
      }

      function getVisibleNodes(nodes) {
        return [...nodes]
          .filter(matchesFilters)
          .sort(compareNodes);
      }

      function matchesFilters(node) {
        if (!app.filters.query) return true;
        const haystack = [node.id, node.properties.name_zh, node.properties.name_en].join(" ").toLowerCase();
        return haystack.includes(app.filters.query);
      }

      function compareNodes(a, b) {
        if (app.filters.sort === "degree") {
          return (app.index.degreeById.get(b.id) || 0) - (app.index.degreeById.get(a.id) || 0);
        }
        const locale = state.lang === "zh" ? "zh-Hans-CN" : "en";
        return getName(a).localeCompare(getName(b), locale);
      }

      function renderStats(allNodes, visibleNodes) {
        app.dom.total.textContent = allNodes.length;
        app.dom.visible.textContent = visibleNodes.length;
        app.dom.edges.textContent = state.data.edges?.length || 0;
        app.dom.status.textContent = allNodes.length
          ? formatText(t("loadedStatus"), { nodes: allNodes.length, edges: state.data.edges?.length || 0 })
          : uiText("importPrompt");
      }

      function renderGrid(nodes) {
        if (!nodes.length) {
          app.dom.grid.innerHTML = `<div class="empty">${escapeHtml(t("empty"))}</div>`;
          return;
        }

        app.dom.grid.innerHTML = nodes.map(renderCharacterCard).join("");
      }

      function renderCharacterCard(node) {
        const image = node.properties.photo || "";
        const degree = app.index.degreeById.get(node.id) || 0;
        return `
          <article class="character-card" data-character-id="${escapeHtml(node.id)}">
            <div class="portrait">${image ? `<img src="${escapeHtml(image)}" alt="${escapeHtml(getName(node))}" loading="lazy">` : ""}</div>
            <div class="card-body">
              <h3>${escapeHtml(getName(node))}</h3>
              <div class="chips">
                <span class="chip">${escapeHtml(t("idLabel"))}: ${escapeHtml(node.id)}</span>
                <span class="chip">${escapeHtml(t("connections"))} ${degree}</span>
              </div>
            </div>
          </article>
        `;
      }

      function syncFloatingPanel() {
        const activeId = app.panel.pinnedId || app.panel.hoveredId;
        if (!activeId) {
          updatePanelVisibility(false);
          return;
        }

        const anchor = document.querySelector(`[data-character-id="${cssEscape(activeId)}"]`);
        if (!anchor) {
          updatePanelVisibility(false);
          return;
        }

        app.dom.panelTitle.textContent = t("relatedTitle");
        app.dom.panelContent.innerHTML = renderRelatedList(activeId);
        updatePanelVisibility(true);
        app.dom.panel.classList.toggle("is-pinned", app.panel.pinnedId === activeId);
        positionFloatingPanel(anchor, app.dom.panel);
      }

      function renderRelatedList(characterId) {
        const relatedList = app.index.relatedById.get(characterId) || [];
        if (!relatedList.length) {
          return `<div class="related-empty">${escapeHtml(t("noRelated"))}</div>`;
        }

        return `
          <div class="related-list">
            ${relatedList.map(renderRelatedItem).join("")}
          </div>
        `;
      }

      function renderRelatedItem({ node, edge, direction }) {
        const label = direction === "out" ? edgeEndpoint(edge, "target") : edgeEndpoint(edge, "source");
        const relation = getRelationText(edge);
        const fallback = `${t("idLabel")}: ${node.id}`;
        return `
          <button class="related-item" type="button" data-related-jump data-target-id="${escapeHtml(node.id)}">
            <strong>${escapeHtml(label || getName(node))}</strong>
            <span>${escapeHtml(relation || fallback)}</span>
          </button>
        `;
      }

      function positionFloatingPanel(anchor, panel) {
        const anchorRect = anchor.getBoundingClientRect();
        const panelRect = panel.getBoundingClientRect();
        const gap = 12;
        const margin = 16;
        let left = anchorRect.right + gap;
        let top = anchorRect.top;

        if (left + panelRect.width > window.innerWidth - margin) {
          left = anchorRect.left - panelRect.width - gap;
        }
        if (left < margin) {
          left = Math.max(margin, window.innerWidth - panelRect.width - margin);
        }
        if (top + panelRect.height > window.innerHeight - margin) {
          top = window.innerHeight - panelRect.height - margin;
        }
        if (top < margin) {
          top = margin;
        }

        panel.style.left = `${left}px`;
        panel.style.top = `${top}px`;
      }

      function showFloatingPanel(characterId) {
        app.panel.hoveredId = characterId;
        syncFloatingPanel();
      }

      function hideFloatingPanel() {
        app.panel.hoveredId = null;
        updatePanelVisibility(false);
      }

      function openCharacterPanel(characterId) {
        app.panel.hoveredId = characterId;
        app.panel.pinnedId = characterId;
        document.querySelector(`[data-character-id="${cssEscape(characterId)}"]`)?.scrollIntoView({
          behavior: "smooth",
          block: "center",
        });
        requestAnimationFrame(syncFloatingPanel);
      }

      function closePinnedPanel() {
        app.panel.hoveredId = null;
        app.panel.pinnedId = null;
        updatePanelVisibility(false);
      }

      function updatePanelVisibility(visible) {
        app.dom.panel.classList.toggle("is-open", visible);
        if (!visible) {
          app.dom.panel.classList.remove("is-pinned");
        }
      }

      function keepPanelStateValid() {
        const nodeIds = new Set((state.data.nodes || []).map((node) => node.id));
        if (app.panel.hoveredId && !nodeIds.has(app.panel.hoveredId)) {
          app.panel.hoveredId = null;
        }
        if (app.panel.pinnedId && !nodeIds.has(app.panel.pinnedId)) {
          app.panel.pinnedId = null;
        }
      }

      function applyTranslations() {
        document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
        document.title = t("documentTitle");

        qsa("[data-i18n]").forEach((element) => {
          element.textContent = t(element.dataset.i18n);
        });
        qsa("[data-placeholder-key]").forEach((element) => {
          element.placeholder = t(element.dataset.placeholderKey);
        });
        qsa("[data-title-key]").forEach((element) => {
          element.title = t(element.dataset.titleKey);
        });

        if (app.dom.fileName) {
          app.dom.fileName.textContent = app.dom.fileName.dataset.loadedFileName ? uiText("fileLoaded") : t("fileHint");
        }
      }

      function getRelationText(edge) {
        const props = edge?.properties || {};
        return props[`content_${state.lang}`] || props[`title_${state.lang}`] || "";
      }

      function t(key) {
        return PAGE_TEXT[state.lang]?.[key] || PAGE_TEXT.en[key] || key;
      }

      function cssEscape(value) {
        if (window.CSS?.escape) return window.CSS.escape(value);
        return String(value).replace(/["\\]/g, "\\$&");
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }
    </script>
  </body>
</html>
